<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Quadra{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="navbar-logo">⬡ Quadra</a>
    <div class="navbar-links">
      <a href="/tracker"  {% if active == 'tracker'  %}class="active"{% endif %}>Трекер</a>
      <a href="/qr"       {% if active == 'qr'       %}class="active"{% endif %}>QR-коды</a>
      <a href="/budget"   {% if active == 'budget'   %}class="active"{% endif %}>Бюджет</a>
      <a href="/email"    {% if active == 'email'    %}class="active"{% endif %}>Email</a>
    </div>
    <div class="burger" id="burger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="/">🏠 Dashboard</a>
    <a href="/tracker">💰 Трекер</a>
    <a href="/qr">📱 QR-коды</a>
    <a href="/budget">✈️ Бюджет</a>
    <a href="/email">📧 Email</a>
  </div>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>Quadra &mdash; учебный проект &copy; 2026</footer>

  <script>
    function toggleMenu() {
      document.getElementById('burger').classList.toggle('open');
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    // Закрыть меню при клике на ссылку
    document.querySelectorAll('.mobile-menu a').forEach(a =>
      a.addEventListener('click', () => {
        document.getElementById('burger').classList.remove('open');
        document.getElementById('mobileMenu').classList.remove('open');
      })
    );

    // Scroll-анимации
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // Подсвечиваем активный пункт меню
    const path = location.pathname.split('/')[1];
    document.querySelectorAll('.navbar-links a, .mobile-menu a').forEach(a => {
      if (a.href.includes(path) && path) a.classList.add('active');
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
